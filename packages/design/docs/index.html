<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DuskMoon Design Tokens</title>
  <style>
    /* Reset */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.6;
      background: var(--color-surface, #fafafa);
      color: var(--color-on-surface, #1a1a1a);
      transition: background 0.3s, color 0.3s;
    }

    /* Layout */
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    header { padding: 2rem 0; border-bottom: 1px solid var(--color-outline-variant, #ddd); margin-bottom: 2rem; }
    header h1 { font-size: 2rem; font-weight: 600; }
    header p { color: var(--color-on-surface-variant, #666); margin-top: 0.25rem; }

    /* Theme Switcher */
    .theme-bar {
      display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center;
      padding: 1rem 0;
    }
    .theme-bar label { font-weight: 500; margin-right: 0.5rem; }
    .theme-btn {
      border: 2px solid var(--color-outline-variant, #ccc);
      background: var(--color-surface-container, #f0f0f0);
      color: var(--color-on-surface, #1a1a1a);
      padding: 0.4rem 1rem; border-radius: 2rem; cursor: pointer;
      font-size: 0.875rem; font-weight: 500;
      transition: all 0.2s;
    }
    .family-label {
      font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--color-on-surface-variant, #888); font-weight: 600;
      margin-left: 0.25rem;
    }
    .family-sep { width: 1px; height: 1.5rem; background: var(--color-outline-variant, #ddd); margin: 0 0.25rem; }
    .theme-meta {
      font-size: 0.85rem; color: var(--color-on-surface-variant, #666);
      margin-top: 0.25rem;
    }
    .theme-meta a { color: var(--color-primary, #4a90d9); text-decoration: none; }
    .theme-meta a:hover { text-decoration: underline; }
    .theme-btn:hover { border-color: var(--color-primary, #666); }
    .theme-btn.active {
      background: var(--color-primary, #333);
      color: var(--color-primary-content, #fff);
      border-color: var(--color-primary, #333);
    }

    /* Section */
    section { margin-bottom: 3rem; }
    section h2 {
      font-size: 1.5rem; font-weight: 600; margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--color-outline-variant, #ddd);
    }
    .section-desc {
      color: var(--color-on-surface-variant, #666);
      margin-bottom: 1.5rem; font-size: 0.9rem;
    }

    /* Color Grid */
    .color-group { margin-bottom: 2rem; }
    .color-group h3 {
      font-size: 1.1rem; font-weight: 500; margin-bottom: 0.75rem;
      text-transform: capitalize;
    }
    .color-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 0.75rem;
    }
    .color-card {
      border-radius: 0.75rem; overflow: hidden;
      border: 1px solid var(--color-outline-variant, #ddd);
      background: var(--color-surface-container-low, #fff);
    }
    .color-swatch {
      height: 80px; width: 100%;
      transition: background-color 0.3s;
    }
    .color-info {
      padding: 0.5rem 0.75rem; font-size: 0.75rem;
    }
    .color-name {
      font-weight: 600; font-size: 0.8rem;
      margin-bottom: 0.15rem;
      word-break: break-all;
    }
    .color-value {
      color: var(--color-on-surface-variant, #888);
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.7rem;
    }

    /* Typography Table */
    .type-table {
      width: 100%; border-collapse: collapse;
    }
    .type-table th, .type-table td {
      text-align: left; padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--color-outline-variant, #eee);
    }
    .type-table th {
      font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--color-on-surface-variant, #666);
      font-weight: 600;
    }
    .type-preview { font-weight: var(--tw); }

    /* Token Pills */
    .token-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.5rem;
    }
    .token-pill {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 0.75rem;
      border-radius: 0.5rem;
      border: 1px solid var(--color-outline-variant, #ddd);
      background: var(--color-surface-container-low, #fff);
      font-size: 0.8rem;
    }
    .token-pill .label { font-weight: 500; }
    .token-pill .value {
      color: var(--color-on-surface-variant, #888);
      font-family: monospace; font-size: 0.75rem;
    }

    /* Spacing visual */
    .spacing-bar {
      height: 1.25rem; border-radius: 0.25rem;
      background: var(--color-primary, #4a90d9);
      opacity: 0.7; transition: width 0.3s;
    }
    .spacing-row {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 0.4rem;
    }
    .spacing-row .label { width: 4rem; font-size: 0.8rem; font-weight: 500; text-align: right; }
    .spacing-row .value {
      font-size: 0.75rem; color: var(--color-on-surface-variant, #888);
      font-family: monospace; min-width: 3rem;
    }

    /* Radius preview */
    .radius-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 1rem;
    }
    .radius-card {
      aspect-ratio: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      border: 2px solid var(--color-primary, #4a90d9);
      background: var(--color-surface-container, #f5f5f5);
      transition: border-radius 0.3s;
    }
    .radius-label { font-weight: 500; font-size: 0.85rem; }
    .radius-value { font-size: 0.75rem; color: var(--color-on-surface-variant, #888); font-family: monospace; }

    /* Shape table */
    .shape-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.75rem;
    }
    .shape-card {
      padding: 1rem; border-radius: 0.75rem;
      border: 1px solid var(--color-outline-variant, #ddd);
      background: var(--color-surface-container-low, #fff);
    }
    .shape-card .label { font-weight: 600; font-size: 0.85rem; }
    .shape-card .value {
      font-family: monospace; font-size: 0.8rem;
      color: var(--color-on-surface-variant, #888);
      margin-top: 0.25rem;
    }

    /* Footer */
    footer {
      margin-top: 4rem; padding: 2rem 0;
      border-top: 1px solid var(--color-outline-variant, #ddd);
      color: var(--color-on-surface-variant, #888);
      font-size: 0.8rem; text-align: center;
    }

    /* Loading */
    #loading {
      text-align: center; padding: 4rem;
      color: var(--color-on-surface-variant, #888);
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div id="loading">Loading design tokens…</div>
  </div>

  <!-- Inline generated data at build time (populated by build script) -->
  <script id="theme-data" type="application/json">__THEME_DATA__</script>
  <script id="shared-data" type="application/json">__SHARED_DATA__</script>
  <!-- CSS is linked dynamically -->

  <script>
    // ── Data ──
    let themes, shared;
    try {
      themes = JSON.parse(document.getElementById('theme-data').textContent);
      shared = JSON.parse(document.getElementById('shared-data').textContent);
    } catch {
      document.getElementById('loading').textContent = 'Failed to load token data.';
      throw new Error('Token data not embedded');
    }

    const themeNames = Object.keys(themes);
    let activeTheme = themeNames[0];

    // Group themes by family using metadata
    const families = {};
    for (const name of themeNames) {
      const meta = themes[name].meta;
      if (meta && meta.family) {
        if (!families[meta.family]) families[meta.family] = [];
        families[meta.family].push(name);
      }
    }

    // ── Color grouping ──
    const COLOR_GROUPS = [
      { name: 'Primary',   keys: ['primary', 'primary-content', 'primary-container', 'on-primary-container'] },
      { name: 'Secondary', keys: ['secondary', 'secondary-content', 'secondary-container', 'on-secondary-container'] },
      { name: 'Tertiary',  keys: ['tertiary', 'tertiary-content', 'tertiary-container', 'on-tertiary-container'] },
      { name: 'Accent',    keys: ['accent', 'accent-content'] },
      { name: 'Neutral',   keys: ['neutral', 'neutral-content', 'neutral-variant'] },
      { name: 'Surface',   keys: ['surface', 'surface-dim', 'surface-bright', 'surface-container-lowest', 'surface-container-low', 'surface-container', 'surface-container-high', 'surface-container-highest', 'surface-variant', 'on-surface', 'on-surface-variant'] },
      { name: 'Base',      keys: ['base-100','base-200','base-300','base-400','base-500','base-600','base-700','base-800','base-900','base-content'] },
      { name: 'Outline',   keys: ['outline', 'outline-variant'] },
      { name: 'Inverse',   keys: ['inverse-surface', 'inverse-on-surface', 'inverse-primary'] },
      { name: 'Shadow',    keys: ['shadow', 'scrim'] },
      { name: 'Semantic',  keys: ['info','info-content','info-container','on-info-container','success','success-content','success-container','on-success-container','warning','warning-content','warning-container','on-warning-container','error','error-content','error-container','on-error-container'] },
    ];

    // ── Helpers ──
    const h = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;');

    function contrastText(hex) {
      const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
      const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
      return lum > 0.5 ? '#000' : '#fff';
    }

    function oklchStr(c) {
      let s = `${c.l*100}% ${c.c} ${c.h}`;
      if (c.alpha != null) s += ` / ${c.alpha*100}%`;
      return s;
    }

    // ── Render ──
    function render() {
      const data = themes[activeTheme];
      const meta = data.meta || {};
      const colors = data.colors;
      const shape = data.shape;
      const { typeScale, spacing, radius, elevation } = shared;

      const familyNames = Object.keys(families);
      const themeSwitcher = familyNames.length > 0
        ? familyNames.map(fam => `
            <span class="family-label">${h(fam)}</span>
            ${families[fam].map(t => `<button class="theme-btn ${t === activeTheme ? 'active' : ''}" onclick="switchTheme('${t}')">${t}</button>`).join('')}
          `).join('<span class="family-sep"></span>')
        : themeNames.map(t => `<button class="theme-btn ${t === activeTheme ? 'active' : ''}" onclick="switchTheme('${t}')">${t}</button>`).join('');

      document.getElementById('app').innerHTML = `
        <header>
          <h1>DuskMoon Design Tokens</h1>
          <p>OKLCH color system &middot; ${themeNames.length} themes in ${familyNames.length} families &middot; Material Design 3 type scale</p>
        </header>

        <div class="theme-bar">
          <label>Theme:</label>
          ${themeSwitcher}
        </div>
        ${meta.description ? `<p class="theme-meta">${h(meta.description)} &middot; ${h(meta.mode)} mode &middot; pair: <a href="#" onclick="event.preventDefault();switchTheme('${meta.pair}')">${h(meta.pair)}</a></p>` : ''}

        <!-- Colors -->
        <section>
          <h2>Colors</h2>
          <p class="section-desc">${Object.keys(colors).length} color tokens in OKLCH color space</p>
          ${COLOR_GROUPS.map(g => `
            <div class="color-group">
              <h3>${h(g.name)}</h3>
              <div class="color-grid">
                ${g.keys.filter(k => colors[k]).map(k => {
                  const c = colors[k];
                  return `<div class="color-card">
                    <div class="color-swatch" style="background-color:${c.hex}"></div>
                    <div class="color-info">
                      <div class="color-name">${h(k)}</div>
                      <div class="color-value">${h(c.hex)}</div>
                      <div class="color-value">oklch(${h(oklchStr(c))})</div>
                    </div>
                  </div>`;
                }).join('')}
              </div>
            </div>
          `).join('')}
        </section>

        <!-- Shape -->
        <section>
          <h2>Shape</h2>
          <p class="section-desc">Per-theme shape tokens defining border radius, size, and visual depth</p>
          <div class="shape-grid">
            ${Object.entries(shape).map(([k, v]) => `
              <div class="shape-card">
                <div class="label">${h(k)}</div>
                <div class="value">${h(String(v))}</div>
              </div>
            `).join('')}
          </div>
        </section>

        <!-- Typography -->
        <section>
          <h2>Typography</h2>
          <p class="section-desc">Material Design 3 type scale — 15 styles across 5 categories</p>
          <table class="type-table">
            <thead><tr><th>Style</th><th>Size</th><th>Weight</th><th>Line Height</th><th>Letter Spacing</th><th>Preview</th></tr></thead>
            <tbody>
              ${Object.entries(typeScale).map(([k, t]) => `
                <tr>
                  <td style="font-weight:500">${h(k)}</td>
                  <td>${t.size}px</td>
                  <td>${t.weight}</td>
                  <td>${t.lineHeight}px</td>
                  <td>${t.letterSpacing}px</td>
                  <td><span class="type-preview" style="font-size:${Math.min(t.size, 32)}px;font-weight:${t.weight};line-height:${t.lineHeight}px;letter-spacing:${t.letterSpacing}px">Aa</span></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </section>

        <!-- Spacing -->
        <section>
          <h2>Spacing</h2>
          <p class="section-desc">14-step spacing scale (px values)</p>
          ${Object.entries(spacing).map(([k, v]) => `
            <div class="spacing-row">
              <span class="label">sp-${h(k)}</span>
              <div class="spacing-bar" style="width:${Math.max(v, 2)}px"></div>
              <span class="value">${v}px</span>
            </div>
          `).join('')}
        </section>

        <!-- Radius -->
        <section>
          <h2>Radius</h2>
          <p class="section-desc">8 border-radius tokens</p>
          <div class="radius-grid">
            ${Object.entries(radius).map(([k, v]) => `
              <div class="radius-card" style="border-radius:${Math.min(v, 40)}px">
                <span class="radius-label">${h(k)}</span>
                <span class="radius-value">${v}px</span>
              </div>
            `).join('')}
          </div>
        </section>

        <!-- Elevation -->
        <section>
          <h2>Elevation</h2>
          <p class="section-desc">6 elevation levels (shadow offset in px)</p>
          <div class="token-grid">
            ${Object.entries(elevation).map(([k, v]) => `
              <div class="token-pill" style="box-shadow: 0 ${v}px ${v*2}px rgba(0,0,0,0.15)">
                <span class="label">${h(k)}</span>
                <span class="value">${v}px</span>
              </div>
            `).join('')}
          </div>
        </section>

        <footer>
          DuskMoon Design Tokens v1.0.0 &middot; Generated by duskmoon-codegen v2.0.0
        </footer>
      `;

      // Apply theme CSS variables by loading the CSS file
      applyThemeCSS();
    }

    function applyThemeCSS() {
      // Apply colors from JSON data directly as CSS custom properties
      const data = themes[activeTheme];
      const root = document.documentElement;
      for (const [k, c] of Object.entries(data.colors)) {
        const alpha = c.alpha != null ? ` / ${c.alpha * 100}%` : '';
        root.style.setProperty(`--color-${k}`, `oklch(${c.l * 100}% ${c.c} ${c.h}${alpha})`);
      }
      for (const [k, v] of Object.entries(data.shape)) {
        if (k.startsWith('radius') || k.startsWith('size') || k === 'border') {
          root.style.setProperty(`--${k}`, String(v));
        }
      }
    }

    function switchTheme(name) {
      activeTheme = name;
      render();
    }

    // ── Init ──
    render();
  </script>
</body>
</html>
