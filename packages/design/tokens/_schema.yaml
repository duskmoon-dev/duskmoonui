version: "2.0"
color_format: "oklch"  # All values: "L% C H" — e.g. "72% 0.17 75"

groups:
  primary:
    tokens: [primary, primary-content, primary-container, on-primary-container]
  secondary:
    tokens: [secondary, secondary-content, secondary-container, on-secondary-container]
  tertiary:
    tokens: [tertiary, tertiary-content, tertiary-container, on-tertiary-container]
  accent:
    tokens: [accent, accent-content]
  neutral:
    tokens: [neutral, neutral-content, neutral-variant]
  surface:
    tokens:
      - surface
      - surface-dim
      - surface-bright
      - surface-container-lowest
      - surface-container-low
      - surface-container
      - surface-container-high
      - surface-container-highest
      - surface-variant
      - on-surface
      - on-surface-variant
  base:
    description: "Extended neutral scale (100=lightest in light mode, 100=darkest in dark mode)"
    tokens: [base-100, base-200, base-300, base-400, base-500, base-600, base-700, base-800, base-900, base-content]
  outline:
    tokens: [outline, outline-variant]
  inverse:
    tokens: [inverse-surface, inverse-on-surface, inverse-primary]
  shadow:
    tokens: [shadow, scrim]
    notes: "scrim supports alpha channel: 'L% C H / A%'"
  semantic:
    tokens:
      - info
      - info-content
      - info-container
      - on-info-container
      - success
      - success-content
      - success-container
      - on-success-container
      - warning
      - warning-content
      - warning-container
      - on-warning-container
      - error
      - error-content
      - error-container
      - on-error-container

shape:
  tokens:
    - radius-selector
    - radius-field
    - radius-box
    - size-selector
    - size-field
    - border
    - depth
    - noise
  format: "css-value"
