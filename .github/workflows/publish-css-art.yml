name: Publish css-art to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.1.0, 0.2.0-beta.1)'
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build:css-art

      - name: Update version (if specified)
        if: inputs.version
        working-directory: packages/css-art
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ inputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('Updated version to', pkg.version);
          "

      - name: Publish to npm
        working-directory: packages/css-art
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Get published version
        id: version
        working-directory: packages/css-art
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Git tag (if manual dispatch with version)
        if: inputs.version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "css-art-v${{ steps.version.outputs.version }}" -m "Release @duskmoon-dev/css-art v${{ steps.version.outputs.version }}"
          git push origin "css-art-v${{ steps.version.outputs.version }}"

      - name: Generate release notes
        id: notes
        if: inputs.version
        run: |
          VERSION="css-art-v${{ steps.version.outputs.version }}"
          PREV_TAG=$(git tag -l "css-art-v*" --sort=-v:refname | head -2 | tail -1)

          echo "## What's Changed" > release_notes.md
          echo "" >> release_notes.md

          if [ -n "$PREV_TAG" ]; then
            git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges -- packages/css-art >> release_notes.md
          else
            git log --pretty=format:"- %s" --no-merges -20 -- packages/css-art >> release_notes.md
          fi

          echo "" >> release_notes.md
          echo "" >> release_notes.md
          echo "## Installation" >> release_notes.md
          echo "" >> release_notes.md
          echo '```bash' >> release_notes.md
          echo "npm install @duskmoon-dev/css-art@${{ steps.version.outputs.version }}" >> release_notes.md
          echo '```' >> release_notes.md

      - name: Create GitHub Release
        if: inputs.version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "css-art-v${{ steps.version.outputs.version }}" \
            --title "@duskmoon-dev/css-art v${{ steps.version.outputs.version }}" \
            --notes-file release_notes.md \
            --verify-tag
