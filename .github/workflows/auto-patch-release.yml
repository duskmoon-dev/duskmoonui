name: Auto Patch Release

on:
  pull_request:
    types: [closed]
  workflow_dispatch:

jobs:
  patch-release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && contains(toJSON(github.event.pull_request.labels.*.name), 'internal request fixed'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install

      - name: Bump patch version
        id: bump
        working-directory: packages/core
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${NEW_VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped version: $CURRENT → $NEW_VERSION"

      - name: Build
        run: bun run build:core

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/core/package.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}"
          git push origin main

      - name: Publish to npm
        working-directory: packages/core
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ steps.bump.outputs.version }}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            NOTES="## Patch Release\n\n"
            NOTES+="Changes since ${PREV_TAG}:\n"
            if [ -n "$PREV_TAG" ]; then
              NOTES+="$(git log ${PREV_TAG}..HEAD~1 --pretty=format:'- %s' --no-merges)\n\n"
              NOTES+="**Full Changelog**: https://github.com/duskmoon-dev/duskmoonui/compare/${PREV_TAG}...${VERSION}"
            fi
          else
            NOTES="## Bug Fixes\n\n"
            NOTES+="Merged PR: #${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}\n\n"
            if [ -n "$PREV_TAG" ]; then
              NOTES+="**Full Changelog**: https://github.com/duskmoon-dev/duskmoonui/compare/${PREV_TAG}...${VERSION}"
            fi
          fi

          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

          echo -e "$NOTES" | gh release create "$VERSION" \
            --title "$VERSION" \
            --notes-file - \
            --verify-tag
