name: Auto Patch Release

on:
  pull_request:
    types: [closed]
  workflow_dispatch:

jobs:
  patch-release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && contains(toJSON(github.event.pull_request.labels.*.name), 'internal request fixed'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install

      - name: Bump patch version in all packages
        id: bump
        run: |
          CURRENT=$(node -p "require('./packages/core/package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"

          node -e "
            const fs = require('fs');
            const version = '${NEW_VERSION}';
            for (const dir of ['packages/core', 'packages/css-art']) {
              const path = \`\${dir}/package.json\`;
              const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
              pkg.version = version;
              fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
            }
          "
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "Bumped: ${CURRENT} → ${NEW_VERSION}"

      - name: Build all packages
        run: bun run build:core && bun run build:css-art

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/core/package.json packages/css-art/package.json
          git commit -m "chore: bump all packages to v${{ steps.bump.outputs.version }}"
          git push origin main

      - name: Publish @duskmoon-dev/core
        working-directory: packages/core
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @duskmoon-dev/css-art
        working-directory: packages/css-art
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create git tag
        run: |
          git tag -a "v${{ steps.bump.outputs.version }}" -m "Release v${{ steps.bump.outputs.version }}"
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Generate release notes
        run: |
          VERSION="v${{ steps.bump.outputs.version }}"
          PREV_TAG=$(git tag -l "v*" --sort=-v:refname | grep -v "^${VERSION}$" | head -1)

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TRIGGER_NOTE="Merged PR: #${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}"
          else
            TRIGGER_NOTE="Manually triggered patch release"
          fi

          {
            echo "## Bug Fixes"
            echo ""
            echo "${TRIGGER_NOTE}"
            echo ""

            if [ -n "$PREV_TAG" ]; then
              git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges
            fi

            echo ""
            echo ""
            echo "## Packages"
            echo ""
            echo "| Package | Version |"
            echo "|---------|---------|"
            echo "| \`@duskmoon-dev/core\` | \`${{ steps.bump.outputs.version }}\` |"
            echo "| \`@duskmoon-dev/css-art\` | \`${{ steps.bump.outputs.version }}\` |"
            echo ""
            echo "## Installation"
            echo ""
            echo '```bash'
            echo "npm install @duskmoon-dev/core@${{ steps.bump.outputs.version }}"
            echo "npm install @duskmoon-dev/css-art@${{ steps.bump.outputs.version }}"
            echo '```'

            if [ -n "$PREV_TAG" ]; then
              echo ""
              echo "**Full Changelog**: https://github.com/duskmoon-dev/duskmoonui/compare/${PREV_TAG}...${VERSION}"
            fi
          } > release_notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.bump.outputs.version }}" \
            --title "v${{ steps.bump.outputs.version }}" \
            --notes-file release_notes.md \
            --verify-tag
