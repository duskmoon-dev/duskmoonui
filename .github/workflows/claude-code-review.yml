name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            /pr-review-toolkit:review-pr ${{ github.repository }}/pull/${{ github.event.pull_request.number }}

            After the review team completes their analysis, post a single consolidated comment to PR #${{ github.event.pull_request.number }} in the ${{ github.repository }} repository using the GitHub API.

            The comment MUST follow this structure:
            ## Claude Code Review

            ### 🔇 Silent Failures & Error Handling
            <findings from silent-failure-hunter, or "No issues found">

            ### 🧩 Type Design
            <findings from type-design-analyzer with ratings, or "No new types introduced">

            ### 🧪 Test Coverage
            <findings from pr-test-analyzer with gaps identified, or "Coverage is adequate">

            ### 💬 Comment Quality
            <findings from comment-analyzer, or "Comments are accurate and maintainable">

            ### 📋 Code Style & Guidelines
            <findings from code-reviewer against CLAUDE.md and project conventions>

            ### ✅ Summary
            <overall verdict: Approve / Request Changes / Needs Discussion>
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

