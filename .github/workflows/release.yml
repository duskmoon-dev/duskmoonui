name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.3)'
        required: true
        type: string
      git_ref:
        description: 'Git ref to release from'
        required: true
        default: 'main'
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install

      - name: Update versions in all packages
        run: |
          node -e "
            const fs = require('fs');
            const version = '${{ inputs.version }}';
            const packages = ['packages/core', 'packages/css-art'];
            for (const dir of packages) {
              const path = \`\${dir}/package.json\`;
              const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
              pkg.version = version;
              fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
              console.log('Updated', pkg.name, 'to', version);
            }
          "

      - name: Build all packages
        run: bun run build:core && bun run build:css-art

      - name: Publish @duskmoon-dev/core
        working-directory: packages/core
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @duskmoon-dev/css-art
        working-directory: packages/css-art
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/core/package.json packages/css-art/package.json
          git commit -am "chore(release): v${{ inputs.version }}"
          git push origin HEAD:${{ inputs.git_ref }}

      - name: Create git tag
        run: |
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Generate release notes
        run: |
          VERSION="v${{ inputs.version }}"
          PREV_TAG=$(git tag -l "v*" --sort=-v:refname | grep -v "^${VERSION}$" | head -1)

          {
            echo "## What's Changed"
            echo ""

            if [ -n "$PREV_TAG" ]; then
              git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges
            else
              git log --pretty=format:"- %s" --no-merges -20
            fi

            echo ""
            echo ""
            echo "## Packages"
            echo ""
            echo "| Package | Version |"
            echo "|---------|---------|"
            echo "| \`@duskmoon-dev/core\` | \`${{ inputs.version }}\` |"
            echo "| \`@duskmoon-dev/css-art\` | \`${{ inputs.version }}\` |"
            echo ""
            echo "## Installation"
            echo ""
            echo '```bash'
            echo "npm install @duskmoon-dev/core@${{ inputs.version }}"
            echo "npm install @duskmoon-dev/css-art@${{ inputs.version }}"
            echo '```'

            if [ -n "$PREV_TAG" ]; then
              echo ""
              echo "**Full Changelog**: https://github.com/duskmoon-dev/duskmoonui/compare/${PREV_TAG}...${VERSION}"
            fi
          } > release_notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --notes-file release_notes.md \
            --verify-tag
